<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Contribuições — Igreja Esperança</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F4F3EE;
    --white: #FFFFFF;
    --green: #4B6740;
    --green-dark: #3A5130;
    --green-light: #EBF0E8;
    --green-mid: #7A9B6E;
    --text: #2A2E27;
    --text-muted: #7A8073;
    --border: rgba(75,103,64,0.15);
    --shadow: 0 2px 16px rgba(75,103,64,0.10);
    --shadow-hover: 0 6px 28px rgba(75,103,64,0.18);
    --radius: 18px;
    --radius-sm: 10px;
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* HERO */
  .hero {
    background: var(--white);
    padding: 40px 24px 32px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    width: 300px; height: 200px;
    background: radial-gradient(ellipse, rgba(75,103,64,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .logo-img {
    width: 220px;
    height: auto;
    display: block;
    margin: 0 auto 20px;
    filter: brightness(0) saturate(100%) invert(30%) sepia(20%) saturate(600%) hue-rotate(70deg) brightness(90%);
  }

  .hero-tagline {
    display: inline-block;
    background: var(--green-light);
    color: var(--green);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 14px;
  }

  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.15;
    margin-bottom: 10px;
  }

  .hero-sub {
    font-size: 14px;
    font-weight: 400;
    color: var(--text-muted);
    line-height: 1.6;
    max-width: 290px;
    margin: 0 auto;
  }

  /* CARDS */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 24px 20px 12px;
  }

  .cards {
    padding: 0 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: box-shadow 0.25s, border-color 0.25s;
    animation: fadeUp 0.45s ease both;
  }

  .card:nth-child(1) { animation-delay: 0.06s; }
  .card:nth-child(2) { animation-delay: 0.13s; }
  .card:nth-child(3) { animation-delay: 0.20s; }
  .card:nth-child(4) { animation-delay: 0.27s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card.active {
    border-color: rgba(75,103,64,0.4);
    box-shadow: var(--shadow-hover);
  }

  .card-top {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 16px 14px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .card-icon {
    width: 46px;
    height: 46px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 22px;
  }

  .card-text { flex: 1; min-width: 0; }

  .card-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 2px;
  }

  .card-desc {
    font-size: 12px;
    font-weight: 400;
    color: var(--text-muted);
  }

  .card-arrow {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.3s, background 0.2s, border-color 0.2s;
  }

  .card-arrow svg {
    width: 14px; height: 14px;
    stroke: var(--text-muted);
    fill: none;
    transition: stroke 0.2s;
  }

  .card.active .card-arrow {
    transform: rotate(180deg);
    background: var(--green-light);
    border-color: rgba(75,103,64,0.3);
  }
  .card.active .card-arrow svg { stroke: var(--green); }

  /* SEPARATOR */
  .card-sep {
    height: 1px;
    background: var(--border);
    margin: 0 16px;
    display: none;
  }
  .card.active .card-sep { display: block; }

  /* KEY ROW */
  .key-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 12px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
  }

  .key-text {
    font-family: 'Courier New', monospace;
    font-size: 12.5px;
    color: var(--green-dark);
    font-weight: 600;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .copy-btn {
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 7px 13px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: background 0.2s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .copy-btn:active { transform: scale(0.95); }
  .copy-btn.ok { background: #4CAF78; }

  .copy-btn svg {
    width: 13px; height: 13px;
    stroke: currentColor; fill: none; stroke-width: 2.2;
  }

  /* QR PANEL */
  .qr-panel {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  .qr-panel.open { max-height: 260px; }

  .qr-inner {
    padding: 14px 16px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .qr-hint {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .qr-box {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .qr-box canvas { display: block; border-radius: 6px; }

  /* FOOTER */
  .footer {
    padding: 20px 24px 48px;
    text-align: center;
  }

  .footer-line {
    width: 40px; height: 2px;
    background: var(--green-light);
    border-radius: 2px;
    margin: 0 auto 16px;
  }

  .footer p {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 400;
    line-height: 1.7;
  }

  .footer strong {
    color: var(--green);
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="hero">
 <img class="logo-img" src="logo.png" alt="Igreja Esperança"> 
 <div class="hero-tagline">Contribuições</div>
  <h1 class="hero-title">Doe com propósito</h1>
  <p class="hero-sub">Toque em um fundo, copie a chave PIX ou escaneie o QR code no seu aplicativo de banco.</p>
</div>

<p class="section-label">Escolha um fundo</p>

<div class="cards" id="cards"></div>

<div class="footer">
  <div class="footer-line"></div>
  <p>Cada contribuição é administrada com<br>fidelidade e transparência.<br><br><strong>Obrigado por fazer parte.</strong></p>
</div>

<script>
const funds = [
  { id:'dizimo', name:'Dízimos e Ofertas', desc:'Conta geral da Igreja', key:'10.703.989/0001-53', emoji:'🕊️', bg:'#EBF0E8' },
  { id:'missional', name:'Pastoral Missional', desc:'Suporte ao trabalho missionário', key:'pastoral@igresperanca.com.br', emoji:'🌍', bg:'#E8EFF5' },
  { id:'misericordia', name:'Fundo de Misericórdia', desc:'Assistência a famílias em necessidade', key:'misericordia@igresperanca.com.br', emoji:'🤲', bg:'#F5EFE8' },
  { id:'outros', name:'Outros', desc:'Contribuições diversas', key:'outros@igresperanca.com.br', emoji:'✦', bg:'#F0EFF0' },
];

const container = document.getElementById('cards');

funds.forEach(f => {
  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'card-' + f.id;
  card.innerHTML = `
    <div class="card-top" onclick="toggle('${f.id}')">
      <div class="card-icon" style="background:${f.bg}">${f.emoji}</div>
      <div class="card-text">
        <div class="card-name">${f.name}</div>
        <div class="card-desc">${f.desc}</div>
      </div>
      <div class="card-arrow">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>
    <div class="card-sep"></div>
    <div class="key-row">
      <span class="key-text" title="${f.key}">${f.key}</span>
      <button class="copy-btn" id="btn-${f.id}" onclick="copyKey('${f.key}','${f.id}',event)">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Copiar
      </button>
    </div>
    <div class="qr-panel" id="qr-panel-${f.id}">
      <div class="qr-inner">
        <p class="qr-hint">QR Code PIX</p>
        <div class="qr-box"><div id="qr-${f.id}"></div></div>
      </div>
    </div>
  `;
  container.appendChild(card);
});

const qrGenerated = {};

function toggle(id) {
  const card = document.getElementById('card-' + id);
  const panel = document.getElementById('qr-panel-' + id);
  const isOpen = card.classList.contains('active');
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.qr-panel').forEach(p => p.classList.remove('open'));
  if (!isOpen) {
    card.classList.add('active');
    panel.classList.add('open');
    if (!qrGenerated[id]) {
      const fund = funds.find(f => f.id === id);
      new QRCode(document.getElementById('qr-' + id), {
        text: fund.key, width: 140, height: 140,
        colorDark: '#3A5130', colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
      qrGenerated[id] = true;
    }
  }
}

function showCopied(id) {
  const btn = document.getElementById('btn-' + id);
  btn.classList.add('ok');
  btn.innerHTML = `<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.2"><polyline points="20 6 9 17 4 12"/></svg> Copiado!`;
  setTimeout(() => {
    btn.classList.remove('ok');
    btn.innerHTML = `<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copiar`;
  }, 2500);
}

function fallbackCopy(key, id) {
  const ta = document.createElement('textarea');
  ta.value = key;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); } catch(err) {}
  document.body.removeChild(ta);
  showCopied(id);
}

function copyKey(key, id, e) {
  e.stopPropagation();
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(key).then(() => showCopied(id)).catch(() => fallbackCopy(key, id));
  } else {
    fallbackCopy(key, id);
  }
}
</script>
</body>
</html>
